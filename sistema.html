<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistema de Lançamentos — 3M Agropecuária</title>
<style>
:root{
 --navy:#1B3A6B;--green:#2E7D32;--amber:#E65100;--red:#C62828;
 --bg:#F0F4F8;--white:#fff;--text:#1a1a2e;--text2:#3d5275;--text3:#8a9ab5;
 --border:#dce4f0;--r:10px;--sh:0 2px 12px rgba(27,58,107,.08);
 --sans:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
 background:linear-gradient(135deg,#0d1f3c 0%,#1B3A6B 50%,#1a3a2e 100%)}
.login-box{background:var(--white);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo img{width:48px;height:48px;border-radius:8px;object-fit:contain}
.login-logo-text .co{font-size:10px;font-weight:800;color:var(--green);letter-spacing:2px;text-transform:uppercase}
.login-logo-text .ti{font-size:16px;font-weight:900;color:var(--navy)}
.login-title{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:6px}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:24px}
.finp{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.finp label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.finp input{padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--sans);color:var(--text);transition:.15s}
.finp input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,58,107,.1)}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,var(--navy),var(--green));color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px}
.btn-login:hover{opacity:.9}
.login-err{background:#fde8e8;color:var(--red);border-radius:8px;padding:10px 14px;font-size:12px;font-weight:600;margin-top:12px;display:none}

/* APP */
.app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:linear-gradient(135deg,var(--navy),#163060);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-left img{width:34px;height:34px;border-radius:6px;object-fit:contain}
.topbar-brand .co{font-size:9px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase}
.topbar-brand .ti{font-size:14px;font-weight:800;color:#fff;line-height:1.2}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border-radius:20px;padding:4px 12px 4px 4px}
.user-avatar{width:28px;height:28px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.user-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.9)}
.btn-sair{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:var(--sans)}
.btn-sair:hover{background:rgba(255,100,100,.2);color:#fff}

.main{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--white);border-radius:10px;padding:4px;box-shadow:var(--sh)}
.tab{flex:1;padding:10px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;font-family:var(--sans);transition:.15s}
.tab.on{background:var(--navy);color:#fff}
.tab:hover:not(.on){background:var(--bg)}

/* FORMULÁRIO */
.form-card{background:var(--white);border-radius:var(--r);padding:24px;box-shadow:var(--sh)}
.form-title{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid.g3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--sans);color:var(--text);background:var(--white);transition:.15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,58,107,.08)}
.fg textarea{resize:vertical;min-height:70px}
.fg .hint{font-size:10px;color:var(--text3)}
.form-sep{grid-column:1/-1;border:none;border-top:1px solid var(--border);margin:4px 0}
.form-actions{grid-column:1/-1;display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.btn{padding:10px 24px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:.15s}
.btn-primary{background:linear-gradient(135deg,var(--navy),var(--green));color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:.3s;z-index:9999;max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

/* LISTA */
.lista-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.lista-title{font-size:16px;font-weight:800;color:var(--navy)}
.badge{background:var(--navy);color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--navy);color:rgba(255,255,255,.9);padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
thead th.r{text-align:right}
tbody tr:hover{background:#f5f8ff}
tbody td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
tbody td.r{text-align:right;font-family:monospace;font-weight:700}
tbody td.red{color:var(--red)}
tbody td.grn{color:var(--green)}
.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
.emp{text-align:center;padding:40px;color:var(--text3);font-size:13px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kp{background:var(--white);border-radius:10px;padding:14px 16px;box-shadow:var(--sh);border-top:3px solid var(--navy)}
.kp-l{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kp-v{font-size:20px;font-weight:900;color:var(--navy)}
.kp-s{font-size:10px;color:var(--text3);margin-top:4px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;color:var(--text3);font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
 .form-grid,.form-grid.g3{grid-template-columns:1fr}
 .main{padding:12px}
 .tabs{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
 <div class="login-box">
  <div class="login-logo">
   <img id="loginLogo" src="" alt="3M">
   <div class="login-logo-text">
    <div class="co">3M Agropecuária</div>
    <div class="ti">Sistema de Lançamentos</div>
   </div>
  </div>
  <div class="login-title">Bem-vindo</div>
  <div class="login-sub">Entre com suas credenciais para acessar o sistema</div>
  <div class="finp">
   <label>Usuário</label>
   <input type="text" id="loginUser" placeholder="seu.usuario" autocomplete="username">
  </div>
  <div class="finp">
   <label>Senha</label>
   <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" onclick="doLogin()">Entrar →</button>
  <div class="login-err" id="loginErr"></div>
 </div>
</div>

<!-- APP -->
<div class="app" id="appWrap">
 <div class="topbar">
  <div class="topbar-left">
   <img id="appLogo" src="" alt="3M">
   <div class="topbar-brand">
    <div class="co">3M Agropecuária</div>
    <div class="ti">Sistema de Lançamentos</div>
   </div>
  </div>
  <div class="topbar-right">
   <div class="user-badge">
    <div class="user-avatar" id="userAvatar">N</div>
    <div class="user-name" id="userName">Usuário</div>
   </div>
   <button class="btn-sair" onclick="sair()">⎋ Sair</button>
  </div>
 </div>

 <div class="main">
  <!-- TABS -->
  <div class="tabs">
   <button class="tab on" onclick="showTab('novo')">➕ Novo Lançamento</button>
   <button class="tab" onclick="showTab('historico')">📋 Histórico</button>
  </div>

  <!-- TAB NOVO LANÇAMENTO -->
  <div id="tab-novo">
   <div class="form-card">
    <div class="form-title">📝 Novo Lançamento</div>
    <div class="form-grid g3">
     <div class="fg">
      <label>Data *</label>
      <input type="date" id="fData" required>
     </div>
     <div class="fg">
      <label>Banco *</label>
      <select id="fBanco">
       <option value="">Selecione...</option>
       <option>Bradesco</option>
       <option>Banco do Brasil</option>
       <option>Santander</option>
       <option>Sicredi</option>
       <option>Cresol</option>
       <option>Sicoob</option>
       <option>Safra</option>
       <option>Pine</option>
       <option>Itaú</option>
      </select>
     </div>
     <div class="fg">
      <label>Status</label>
      <select id="fStatus">
       <option value="">—</option>
       <option value="E">E — Executado</option>
       <option value="P">P — Pendente</option>
       <option value="C">C — Cancelado</option>
      </select>
     </div>
    </div>

    <div class="form-grid" style="margin-top:14px">
     <div class="fg">
      <label>Fornecedor</label>
      <input type="text" id="fFornecedor" placeholder="Nome do fornecedor">
     </div>
     <div class="fg">
      <label>N. Doc / NF</label>
      <input type="text" id="fNdoc" placeholder="Número do documento">
     </div>
    </div>

    <div class="form-grid" style="margin-top:14px">
     <div class="fg">
      <label>Processo Compras</label>
      <input type="text" id="fProcesso" placeholder="Ex: TERMO-001 / MAN-07">
     </div>
     <div class="fg">
      <label>Classificação *</label>
      <select id="fClassificacao">
       <option value="">Selecione...</option>
       <optgroup label="RECEITAS">
        <option>RECEITA LÍQUIDA - PECUÁRIA</option>
        <option>RECEITA LÍQUIDA - AGRICULTURA</option>
        <option>RECEITA LÍQUIDA - ADMINISTRATIVO</option>
        <option>RECEITAS FINANCEIRAS</option>
       </optgroup>
       <optgroup label="CMV">
        <option>CMV - COMPRA DE GADO</option>
        <option>CMV - SANIDADE ANIMAL</option>
        <option>CMV - PASTAGENS</option>
        <option>CMV - NUTRIÇÃO ANIMAL</option>
        <option>CMV - PRODUÇÃO DE SILAGEM</option>
        <option>CMV - OUTROS CUSTOS - PECUÁRIA</option>
        <option>CMV - MILHO</option>
        <option>CMV - SOJA</option>
        <option>CMV - SORGO</option>
       </optgroup>
       <optgroup label="GASTO COM PESSOAL">
        <option>GASTO COM PESSOAL - PECUÁRIA</option>
        <option>GASTO COM PESSOAL - AGRICULTURA</option>
        <option>GASTO COM PESSOAL - ADMINISTRATIVO</option>
        <option>GASTO COM PESSOAL - SEDE</option>
       </optgroup>
       <optgroup label="OUTRAS DESPESAS">
        <option>OUTRAS DESPESAS - PECUÁRIA</option>
        <option>OUTRAS DESPESAS - AGRICULTURA</option>
        <option>OUTRAS DESPESAS - ADMINISTRATIVO</option>
        <option>OUTRAS DESPESAS - SEDE</option>
       </optgroup>
       <optgroup label="TRIBUTOS">
        <option>TRIBUTOS E TAXAS - PECUÁRIA</option>
        <option>TRIBUTOS E TAXAS - AGRICULTURA</option>
        <option>TRIBUTOS E TAXAS - ADMINISTRATIVO</option>
       </optgroup>
       <optgroup label="FINANCEIRO">
        <option>PAGAMENTO DE FINANCIMENTO</option>
        <option>ENTRADAS DE FINANCIAMENTOS</option>
        <option>APLICAÇÃO FINANCEIRA</option>
        <option>RESGATE FINANCEIRO</option>
        <option>CONSÓRCIO - INVESTIMENTO</option>
        <option>OBRAS - INVESTIMENTO</option>
        <option>TRANSFERENCIA ENTRE CONTAS</option>
        <option>RESTITUIÇÃO DE MÚTUO</option>
        <option>LUCRO FINANCEIRO B3</option>
        <option>PERDA FINANCEIRA B3</option>
       </optgroup>
      </select>
     </div>
    </div>

    <div class="form-grid" style="margin-top:14px">
     <div class="fg" style="grid-column:1/-1">
      <label>Histórico *</label>
      <textarea id="fHistorico" placeholder="Descrição detalhada do lançamento..."></textarea>
     </div>
    </div>

    <div class="form-grid g3" style="margin-top:14px">
     <div class="fg">
      <label>Débito R$</label>
      <input type="number" id="fDebito" placeholder="0,00" step="0.01" min="0">
      <span class="hint">Saída de caixa</span>
     </div>
     <div class="fg">
      <label>Crédito R$</label>
      <input type="number" id="fCredito" placeholder="0,00" step="0.01" min="0">
      <span class="hint">Entrada de caixa</span>
     </div>
     <div class="fg">
      <label>SAP</label>
      <input type="text" id="fSap" placeholder="Código SAP">
     </div>
    </div>

    <div class="form-grid" style="margin-top:14px">
     <div class="fg">
      <label>Categoria</label>
      <select id="fCategoria">
       <option value="">—</option>
       <option value="C">C — Confirmado</option>
      </select>
     </div>
     <div class="fg">
      <label>Previsão</label>
      <select id="fPrevisao">
       <option value="">—</option>
       <option value="C">C — Previsão</option>
      </select>
     </div>
    </div>

    <div class="form-actions" style="margin-top:20px">
     <button class="btn btn-secondary" onclick="limparForm()">↺ Limpar</button>
     <button class="btn btn-primary" onclick="salvarLancamento()" id="btnSalvar">💾 Salvar Lançamento</button>
    </div>
   </div>
  </div>

  <!-- TAB HISTÓRICO -->
  <div id="tab-historico" style="display:none">
   <div class="kpis" id="kpisHist"></div>
   <div class="form-card">
    <div class="lista-header">
     <div class="lista-title">📋 Últimos Lançamentos do Mês</div>
     <button class="btn btn-secondary" style="padding:6px 14px;font-size:11px" onclick="carregarHistorico()">↻ Atualizar</button>
    </div>
    <div id="listaLanc"><div class="loading"><div class="spin"></div>Carregando...</div></div>
   </div>
  </div>
 </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============ CONFIGURAÇÃO ============
const GAS = 'https://script.google.com/macros/s/AKfycbztCnbZTWilm7ZsO36UK2ROOlQSTlI1zEUDDGl9Szdxhk4hHO5KwOVG4JeNd1C6_Oo/exec';

// ============ ESTADO ============
let _sessao = null; // {usuario, senha, nome, perfil}

// ============ LOGO ============
// Tentar puxar logo do dashboard (se estiver no mesmo domínio)
function setLogo(){
 try{
  const logos = ['loginLogo','appLogo'];
  logos.forEach(id => {
   const el = document.getElementById(id);
   if(el) el.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><rect width="48" height="48" rx="8" fill="%231B3A6B"/><text y="30" x="24" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="16" fill="white">3M</text></svg>';
  });
 }catch(e){}
}

// ============ LOGIN ============
async function doLogin(){
 const usuario = document.getElementById('loginUser').value.trim();
 const senha = document.getElementById('loginPass').value.trim();
 const err = document.getElementById('loginErr');
 err.style.display='none';
 if(!usuario||!senha){err.textContent='Preencha usuário e senha';err.style.display='block';return;}
 try{
  const r = await post({action:'login', usuario, senha});
  if(!r.ok){err.textContent=r.erro||'Erro de acesso';err.style.display='block';return;}
  _sessao = {usuario, senha, nome:r.nome, perfil:r.perfil};
  localStorage.setItem('3m_sis_sessao', btoa(JSON.stringify(_sessao)));
  iniciarApp();
 }catch(e){err.textContent='Erro de conexão: '+e.message;err.style.display='block';}
}

function iniciarApp(){
 document.getElementById('loginWrap').style.display='none';
 const app = document.getElementById('appWrap');
 app.style.display='flex';
 document.getElementById('userName').textContent = _sessao.nome.split(' ')[0];
 document.getElementById('userAvatar').textContent = _sessao.nome[0].toUpperCase();
 // Definir data padrão como hoje
 document.getElementById('fData').value = new Date().toISOString().slice(0,10);
 // Desabilitar botão salvar para visualizadores
 if(_sessao.perfil==='visualizador'){
  document.getElementById('btnSalvar').disabled=true;
  document.getElementById('btnSalvar').textContent='Sem permissão de lançamento';
 }
}

function sair(){
 _sessao=null;
 localStorage.removeItem('3m_sis_sessao');
 document.getElementById('appWrap').style.display='none';
 document.getElementById('loginWrap').style.display='flex';
 document.getElementById('loginUser').value='';
 document.getElementById('loginPass').value='';
}

// ============ TABS ============
function showTab(t){
 document.getElementById('tab-novo').style.display = t==='novo'?'block':'none';
 document.getElementById('tab-historico').style.display = t==='historico'?'block':'none';
 document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',(i===0&&t==='novo')||(i===1&&t==='historico')));
 if(t==='historico') carregarHistorico();
}

// ============ FORMULÁRIO ============
function limparForm(){
 ['fFornecedor','fNdoc','fProcesso','fHistorico','fDebito','fCredito','fSap'].forEach(id=>{
  document.getElementById(id).value='';
 });
 ['fBanco','fStatus','fClassificacao','fCategoria','fPrevisao'].forEach(id=>{
  document.getElementById(id).selectedIndex=0;
 });
 document.getElementById('fData').value = new Date().toISOString().slice(0,10);
}

async function salvarLancamento(){
 const btn = document.getElementById('btnSalvar');
 const data = document.getElementById('fData').value;
 const historico = document.getElementById('fHistorico').value.trim();
 const classificacao = document.getElementById('fClassificacao').value;
 const debito = document.getElementById('fDebito').value;
 const credito = document.getElementById('fCredito').value;

 if(!data){toast('Informe a data','err');return;}
 if(!historico){toast('Informe o histórico','err');return;}
 if(!classificacao){toast('Selecione a classificação','err');return;}
 if(!debito&&!credito){toast('Informe débito ou crédito','err');return;}

 btn.disabled=true;btn.textContent='Salvando...';
 try{
  const r = await post({
   action:'lancar',
   usuario:_sessao.usuario,
   senha:_sessao.senha,
   data,
   fornecedor: document.getElementById('fFornecedor').value.trim(),
   banco: document.getElementById('fBanco').value,
   ndoc: document.getElementById('fNdoc').value.trim(),
   processo: document.getElementById('fProcesso').value.trim(),
   classificacao,
   historico,
   debito: debito||0,
   credito: credito||0,
   status: document.getElementById('fStatus').value,
   sap: document.getElementById('fSap').value.trim(),
   categoria: document.getElementById('fCategoria').value,
   previsao: document.getElementById('fPrevisao').value,
  });
  if(r.ok){
   toast('✅ '+r.msg+' ('+r.aba+', linha '+r.linha+')','ok');
   limparForm();
  } else {
   toast('❌ '+r.erro,'err');
  }
 }catch(e){toast('❌ Erro: '+e.message,'err');}
 btn.disabled=false;btn.textContent='💾 Salvar Lançamento';
}

// ============ HISTÓRICO ============
async function carregarHistorico(){
 const div = document.getElementById('listaLanc');
 div.innerHTML='<div class="loading"><div class="spin"></div>Carregando lançamentos...</div>';
 try{
  const r = await post({action:'recentes',usuario:_sessao.usuario,senha:_sessao.senha});
  if(!r.ok||!r.lancamentos?.length){
   div.innerHTML='<div class="emp">Nenhum lançamento encontrado neste mês</div>';
   return;
  }
  const lanc = r.lancamentos;
  const totDeb = lanc.reduce((s,l)=>s+(parseFloat(l.debito)||0),0);
  const totCred = lanc.reduce((s,l)=>s+(parseFloat(l.credito)||0),0);
  document.getElementById('kpisHist').innerHTML=`
   <div class="kp"><div class="kp-l">Lançamentos</div><div class="kp-v">${lanc.length}</div><div class="kp-s">mês atual</div></div>
   <div class="kp" style="border-top-color:var(--red)"><div class="kp-l">Total Débitos</div><div class="kp-v" style="color:var(--red)">${R$(totDeb)}</div></div>
   <div class="kp" style="border-top-color:var(--green)"><div class="kp-l">Total Créditos</div><div class="kp-v" style="color:var(--green)">${R$(totCred)}</div></div>`;
  div.innerHTML=`<div class="tw"><table>
   <thead><tr><th>Data</th><th>Fornecedor</th><th>Histórico</th><th>Classificação</th><th class="r">Débito</th><th class="r">Crédito</th></tr></thead>
   <tbody>${lanc.map(l=>`<tr>
    <td>${fmtDate(l.data)}</td>
    <td style="font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.fornecedor||'—'}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text3)">${l.historico||'—'}</td>
    <td style="font-size:10px;color:var(--text3)">${l.classificacao||'—'}</td>
    <td class="r red">${l.debito?R$(l.debito):'—'}</td>
    <td class="r grn">${l.credito?R$(l.credito):'—'}</td>
   </tr>`).join('')}</tbody>
  </table></div>`;
 }catch(e){div.innerHTML='<div class="emp">Erro: '+e.message+'</div>';}
}

// ============ UTILITÁRIOS ============
function R$(v){return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function fmtDate(d){
 if(!d)return'—';
 const dt=new Date(d);
 if(isNaN(dt))return String(d).slice(0,10);
 return dt.toLocaleDateString('pt-BR');
}

async function post(body){
 const r = await fetch(GAS, {
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify(body),
  redirect:'follow',
 });
 if(!r.ok) throw new Error('HTTP '+r.status);
 return r.json();
}

let _toastTimer;
function toast(msg, tipo='ok'){
 const el = document.getElementById('toast');
 el.textContent=msg;
 el.className='toast '+tipo+' show';
 clearTimeout(_toastTimer);
 _toastTimer=setTimeout(()=>el.classList.remove('show'),4000);
}

setLogo();

try{
 const saved = localStorage.getItem('3m_sis_sessao');
 if(saved){
  _sessao = JSON.parse(atob(saved));
  iniciarApp();
 }
}catch(e){localStorage.removeItem('3m_sis_sessao');}

document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();});
</script>
